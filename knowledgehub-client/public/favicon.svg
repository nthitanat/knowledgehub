<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E87EAB"/>
      <stop offset="100%" stop-color="#B8356A"/>
    </linearGradient>
    <!-- Inner shine highlight -->
    <radialGradient id="shine" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Squircle background (rx ≈ 24% → true squircle feel) -->
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>

  <!-- Inner highlight for depth -->
  <rect width="100" height="100" rx="24" fill="url(#shine)"/>

  <!-- Stylised "G" — bold, centred -->
  <!-- Outer arc of G (open circle arc, top + left + bottom) -->
  <path d="M 72,34 A 28,28 0 1 0 72,66" stroke="white" stroke-width="11" fill="none" stroke-linecap="round"/>
  <!-- Horizontal crossbar of G -->
  <rect x="50" y="45" width="24" height="10" rx="3" fill="white"/>
</svg>
